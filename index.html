<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Vault | Modern Class Notes</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #0f0c20 100%);
            --sidebar-bg: rgba(15, 23, 42, 0.6);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover-bg: rgba(255, 255, 255, 0.07);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border-glass: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            position: relative;
            overflow-x: hidden;
        }

        /* Interactive Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Floating Interactive S.C Text Background */
        .sc-background-text {
            position: fixed;
            font-size: 25vw;
            font-weight: 900;
            background: linear-gradient(45deg, rgba(99, 102, 241, 0.05), rgba(168, 85, 247, 0.05));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            filter: blur(2px);
            animation: floatingText 12s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes floatingText {
            0% { transform: translate(5%, 10%) rotate(0deg) scale(1); }
            50% { transform: translate(15%, 25%) rotate(5deg) scale(1.05); filter: blur(1px); }
            100% { transform: translate(-5%, 15%) rotate(-3deg) scale(0.95); }
        }

        /* App Wrapper to keep content above canvas */
        .app-container {
            display: flex;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* Sidebar Navigation */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--accent-gradient);
            border-radius: 50%;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .filter-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: var(--card-hover-bg);
            color: var(--text-main);
            transform: translateX(4px);
        }

        .filter-btn.active {
            background: var(--accent-gradient);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25);
        }

        /* Main Content Area */
        main {
            margin-left: 280px;
            flex: 1;
            padding: 40px 50px;
            max-width: 1400px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
        }

        .welcome-text h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .welcome-text p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-wrapper {
            position: relative;
            width: 350px;
        }

        .search-bar {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-glass);
            padding: 14px 20px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* Notes Grid Dashboard */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .note-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .note-card:hover {
            transform: translateY(-6px);
            background: var(--card-hover-bg);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .tag {
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .note-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .note-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-glass);
            padding-top: 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            aside { width: 240px; }
            main { margin-left: 240px; padding: 30px; }
            header { flex-direction: column; align-items: flex-start; }
            .search-wrapper { width: 100%; }
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            aside { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border-glass); padding: 20px; }
            main { margin-left: 0; padding: 20px; }
            .filter-menu { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .filter-btn { white-space: nowrap; }
            .sc-background-text { font-size: 40vw; }
        }
    </style>
</head>
<body>

    <!-- Moving Interactive Canvas Particle System -->
    <canvas id="bg-canvas"></canvas>

    <!-- Glowing Interactive Floating Text -->
    <div class="sc-background-text" id="interactiveSC">S.C</div>

    <!-- App Content Wrapper -->
    <div class="app-container">
        <!-- Sidebar Section -->
        <aside>
            <div class="brand">AcademicVault</div>
            <p class="nav-label">Subjects</p>
            <div class="filter-menu">
                <button class="filter-btn active" data-target="all" onclick="setCategory(this)">All Subjects</button>
                <button class="filter-btn" data-target="physics" onclick="setCategory(this)">Physics</button>
                <button class="filter-btn" data-target="chemistry" onclick="setCategory(this)">Chemistry</button>
                <button class="filter-btn" data-target="math" onclick="setCategory(this)">Mathematics</button>
                <button class="filter-btn" data-target="humanities" onclick="setCategory(this)">Humanities</button>
                <button class="filter-btn" data-target="mechanical-eng" onclick="setCategory(this)">Mechanical Eng.</button>
                <button class="filter-btn" data-target="mechanical-drawing" onclick="setCategory(this)">Mechanical Drawing</button>
            </div>
        </aside>
