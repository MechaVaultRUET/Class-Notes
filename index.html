            --bg-gradient: linear-gradient(135deg, #020205 0%, #05030a 100%);

            --text-main: #f8fafc;

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;

            position: relative;
            overflow-x: hidden;
